<!DOCTYPE html>
<html>
<head>
<title>Vanna Katha</title>
</head>

<body>

<h1>My Comic Project</h1>

<button onclick="getData()">Get Backend Data</button>

<p id="result"></p>

<script>
function getData() {
  fetch("http://localhost:3000")
    .then(res => res.text())
    .then(data => {
      document.getElementById("result").innerText = data;
    });
}
</script>

</body>
</html>
