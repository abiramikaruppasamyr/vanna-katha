<!DOCTYPE html>
<html>
<head>
  <title>Vanna Katha</title>

  <style>
    body{
      font-family: Arial;
    }

    #canvas-container{
      border:2px solid #ccc;
      margin:20px 0;
      width:800px;
    }

    .btn{
      padding:10px 20px;
      margin:5px;
      cursor:pointer;
      border:none;
      background:#3498db;
      color:white;
      border-radius:5px;
    }

    .btn:hover{
      background:#2980b9;
    }
  </style>

</head>

<body>

<h1>My Comic Project</h1>

<button class="btn" onclick="getData()">Get Backend Data</button>

<p id="result"></p>

<h2>SVG Editor</h2>

<div id="canvas-container">
  <canvas id="editor-canvas" width="800" height="500"></canvas>
</div>

<button class="btn" onclick="addRectangle()">Add Rectangle</button>
<button class="btn" onclick="addCircle()">Add Circle</button>
<button class="btn" onclick="addTriangle()">Add Triangle</button>
<button class="btn" onclick="addText()">Add Text</button>

<br>

<button class="btn" onclick="exportSVG()">Export as SVG</button>
<button class="btn" onclick="exportPNG()">Export as PNG</button>
<button class="btn" onclick="saveToBackend()">Save to Backend</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<script>

const canvas = new fabric.Canvas('editor-canvas');

function getData(){

  fetch("http://localhost:3000")
  .then(res => res.text())
  .then(data => {

    document.getElementById("result").innerText = data;

  });

}

function addRectangle(){

  const rect = new fabric.Rect({

    left:100,
    top:100,
    fill:'#3498db',
    width:120,
    height:80

  });

  canvas.add(rect);

}

function addCircle(){

  const circle = new fabric.Circle({

    left:250,
    top:100,
    fill:'#e74c3c',
    radius:50

  });

  canvas.add(circle);

}

function addTriangle(){

  const triangle = new fabric.Triangle({

    left:400,
    top:100,
    fill:'#2ecc71',
    width:100,
    height:80

  });

  canvas.add(triangle);

}

function addText(){

  const text = new fabric.IText('Edit Me',{

    left:100,
    top:250,
    fontSize:30,
    fill:"#000"

  });

  canvas.add(text);

}

function getSVG(){

  return canvas.toSVG();

}

function exportSVG(){

  const svgData = getSVG();

  const blob = new Blob([svgData],{type:'image/svg+xml'});

  const url = URL.createObjectURL(blob);

  const link = document.createElement('a');

  link.href = url;

  link.download = "drawing.svg";

  link.click();

  URL.revokeObjectURL(url);

}

function exportPNG(){

  const dataURL = canvas.toDataURL({

    format:'png',
    quality:1

  });

  const link = document.createElement('a');

  link.href = dataURL;

  link.download = "drawing.png";

  link.click();

}

function saveToBackend(){

  const svgData = getSVG();

  fetch("http://localhost:3000/save-svg",{

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({

      svg:svgData

    })

  })

  .then(res=>res.text())

  .then(data=>{

    alert("Saved successfully : "+data);

  })

  .catch(err=>{

    alert("Error saving : "+err);

  });

}

</script>

</body>
</html>
